name: Build & Release BM Player

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-x64:
    name: Windows x64 Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Generate PNG icon
        run: node scripts/generate-icon.js
      - name: Convert PNG → ICO
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $bmp = [System.Drawing.Bitmap]::FromFile((Resolve-Path "buildResources\icon.png").Path)
          $sizes = @(16,32,48,64,128,256)
          $stream = [System.IO.File]::Create("buildResources\icon.ico")
          $w = New-Object System.IO.BinaryWriter($stream)
          $w.Write([uint16]0); $w.Write([uint16]1); $w.Write([uint16]$sizes.Count)
          $offset = 6 + $sizes.Count * 16; $imgs = @()
          foreach ($s in $sizes) {
            $r = New-Object System.Drawing.Bitmap($bmp,$s,$s)
            $ms = New-Object System.IO.MemoryStream
            $r.Save($ms,[System.Drawing.Imaging.ImageFormat]::Png)
            $imgs += ,$ms.ToArray(); $r.Dispose()
          }
          for ($i=0; $i -lt $sizes.Count; $i++) {
            $sz=$sizes[$i]; $d=$imgs[$i]
            $w.Write([byte]($sz -band 0xFF)); $w.Write([byte]($sz -band 0xFF))
            $w.Write([byte]0); $w.Write([byte]0); $w.Write([uint16]1); $w.Write([uint16]32)
            $w.Write([uint32]$d.Length); $w.Write([uint32]$offset); $offset+=$d.Length
          }
          $imgs | ForEach-Object { $w.Write($_) }
          $w.Close(); $stream.Close(); $bmp.Dispose()
          Write-Host "ICO created at buildResources\icon.ico"
      - name: Download mpv x64
        shell: bash
        run: |
          mkdir -p vendor/mpv
          ASSET_URL=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest" \
            | jq -r '.assets[] | select(.name | test("^mpv-x86_64-[0-9]+-git-[0-9a-f]+\\.7z$")) | .browser_download_url' \
            | head -1)
          echo "Downloading: $ASSET_URL"
          curl -fL "$ASSET_URL" -o vendor/mpv/mpv.7z
          cd vendor/mpv && 7z e mpv.7z -y && rm mpv.7z
      - name: Build x64
        run: npx electron-builder --win nsis --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: BM-Player-x64
          path: dist/BM-Player-Setup-*-x64.exe
          if-no-files-found: error

  build-x86:
    name: Windows x86 Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Generate PNG icon
        run: node scripts/generate-icon.js
      - name: Convert PNG → ICO
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          $bmp = [System.Drawing.Bitmap]::FromFile((Resolve-Path "buildResources\icon.png").Path)
          $sizes = @(16,32,48,64,128,256)
          $stream = [System.IO.File]::Create("buildResources\icon.ico")
          $w = New-Object System.IO.BinaryWriter($stream)
          $w.Write([uint16]0); $w.Write([uint16]1); $w.Write([uint16]$sizes.Count)
          $offset = 6 + $sizes.Count * 16; $imgs = @()
          foreach ($s in $sizes) {
            $r = New-Object System.Drawing.Bitmap($bmp,$s,$s)
            $ms = New-Object System.IO.MemoryStream
            $r.Save($ms,[System.Drawing.Imaging.ImageFormat]::Png)
            $imgs += ,$ms.ToArray(); $r.Dispose()
          }
          for ($i=0; $i -lt $sizes.Count; $i++) {
            $sz=$sizes[$i]; $d=$imgs[$i]
            $w.Write([byte]($sz -band 0xFF)); $w.Write([byte]($sz -band 0xFF))
            $w.Write([byte]0); $w.Write([byte]0); $w.Write([uint16]1); $w.Write([uint16]32)
            $w.Write([uint32]$d.Length); $w.Write([uint32]$offset); $offset+=$d.Length
          }
          $imgs | ForEach-Object { $w.Write($_) }
          $w.Close(); $stream.Close(); $bmp.Dispose()
      - name: Download mpv x86
        shell: bash
        run: |
          mkdir -p vendor/mpv
          ASSET_URL=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases?per_page=10" \
            | jq -r '.[].assets[] | select(.name | test("^mpv-i686-[0-9]+-git-[0-9a-f]+\\.7z$")) | .browser_download_url' \
            | head -1)
          if [ -z "$ASSET_URL" ]; then
            ASSET_URL=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest" \
              | jq -r '.assets[] | select(.name | test("^mpv-x86_64-[0-9]+-git-[0-9a-f]+\\.7z$")) | .browser_download_url' \
              | head -1)
          fi
          echo "Downloading: $ASSET_URL"
          curl -fL "$ASSET_URL" -o vendor/mpv/mpv.7z
          cd vendor/mpv && 7z e mpv.7z -y && rm mpv.7z
      - name: Build x86
        run: npx electron-builder --win nsis --ia32 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: BM-Player-x86
          path: dist/BM-Player-Setup-*-ia32.exe
          if-no-files-found: error