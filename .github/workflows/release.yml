name: Build & Release BM Player

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── x64 Build ────────────────────────────────────────────
  build-x64:
    name: Windows x64 Installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate icon
        run: node scripts/generate-icon.js

      - name: Convert icon PNG to ICO
        shell: pwsh
        run: |
          $pngPath = "buildResources\icon.png"
          $icoPath = "buildResources\icon.ico"
          Add-Type -AssemblyName System.Drawing
          $bmp = [System.Drawing.Bitmap]::FromFile((Resolve-Path $pngPath).Path)
          $sizes = @(16, 32, 48, 64, 128, 256)
          $stream = [System.IO.File]::Create($icoPath)
          $writer = New-Object System.IO.BinaryWriter($stream)
          $writer.Write([uint16]0); $writer.Write([uint16]1); $writer.Write([uint16]$sizes.Count)
          $offset = 6 + $sizes.Count * 16; $images = @()
          foreach ($size in $sizes) {
            $resized = New-Object System.Drawing.Bitmap($bmp, $size, $size)
            $ms = New-Object System.IO.MemoryStream
            $resized.Save($ms, [System.Drawing.Imaging.ImageFormat]::Png)
            $images += ,$ms.ToArray(); $resized.Dispose()
          }
          foreach ($i in 0..($sizes.Count-1)) {
            $sz=$sizes[$i]; $data=$images[$i]
            $writer.Write([byte]($sz -band 0xFF)); $writer.Write([byte]($sz -band 0xFF))
            $writer.Write([byte]0); $writer.Write([byte]0)
            $writer.Write([uint16]1); $writer.Write([uint16]32)
            $writer.Write([uint32]$data.Length); $writer.Write([uint32]$offset); $offset+=$data.Length
          }
          foreach ($data in $images) { $writer.Write($data) }
          $writer.Close(); $stream.Close(); $bmp.Dispose()

      - name: Download and Extract mpv x64
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin
          Write-Host "Fetching latest mpv x64 release using authenticated GitHub CLI..."
          $releases = gh api repos/shinchiro/mpv-winbuild-cmake/releases/latest | ConvertFrom-Json
          $asset = $releases.assets | Where-Object { $_.name -match "^mpv-x86_64-\d{8}-git-[a-f0-9]+\.7z$" } | Select-Object -First 1
          
          if (-not $asset) {
              Write-Error "Could not find a matching mpv release asset!"
              exit 1
          }
          
          Write-Host "Found asset: $($asset.name). Downloading..."
          gh release download -R shinchiro/mpv-winbuild-cmake -p $asset.name
          
          Write-Host "Extracting directly to bin directory..."
          7z e $asset.name -obin -y
          Remove-Item $asset.name -Force
          
          Write-Host "Verifying bin directory:"
          Get-ChildItem bin

      - name: Build x64 installer
        run: npx electron-builder --win nsis --x64 --publish always

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: BM-Player-x64
          path: dist/BM-Player-Setup-*-x64.exe
          if-no-files-found: warn

  # ── x86 Build ────────────────────────────────────────────
  build-x86:
    name: Windows x86 Installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate icon
        run: node scripts/generate-icon.js

      - name: Convert icon PNG to ICO
        shell: pwsh
        run: |
          $pngPath = "buildResources\icon.png"
          $icoPath = "buildResources\icon.ico"
          Add-Type -AssemblyName System.Drawing
          $bmp = [System.Drawing.Bitmap]::FromFile((Resolve-Path $pngPath).Path)
          $sizes = @(16, 32, 48, 64, 128, 256)
          $stream = [System.IO.File]::Create($icoPath)
          $writer = New-Object System.IO.BinaryWriter($stream)
          $writer.Write([uint16]0); $writer.Write([uint16]1); $writer.Write([uint16]$sizes.Count)
          $offset = 6 + $sizes.Count * 16; $images = @()
          foreach ($size in $sizes) {
            $resized = New-Object System.Drawing.Bitmap($bmp, $size, $size)
            $ms = New-Object System.IO.MemoryStream
            $resized.Save($ms, [System.Drawing.Imaging.ImageFormat]::Png)
            $images += ,$ms.ToArray(); $resized.Dispose()
          }
          foreach ($i in 0..($sizes.Count-1)) {
            $sz=$sizes[$i]; $data=$images[$i]
            $writer.Write([byte]($sz -band 0xFF)); $writer.Write([byte]($sz -band 0xFF))
            $writer.Write([byte]0); $writer.Write([byte]0)
            $writer.Write([uint16]1); $writer.Write([uint16]32)
            $writer.Write([uint32]$data.Length); $writer.Write([uint32]$offset); $offset+=$data.Length
          }
          foreach ($data in $images) { $writer.Write($data) }
          $writer.Close(); $stream.Close(); $bmp.Dispose()

      - name: Download and Extract mpv x86
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin
          Write-Host "Fetching latest mpv x86 release using authenticated GitHub CLI..."
          $releases = gh api repos/shinchiro/mpv-winbuild-cmake/releases/latest | ConvertFrom-Json
          $asset = $releases.assets | Where-Object { $_.name -match "^mpv-i686-\d{8}-git-[a-f0-9]+\.7z$" } | Select-Object -First 1
          
          if (-not $asset) {
              Write-Error "Could not find a matching mpv x86 release asset!"
              exit 1
          }
          
          Write-Host "Found asset: $($asset.name). Downloading..."
          gh release download -R shinchiro/mpv-winbuild-cmake -p $asset.name
          
          Write-Host "Extracting directly to bin directory..."
          7z e $asset.name -obin -y
          Remove-Item $asset.name -Force

      - name: Build x86 installer
        run: npx electron-builder --win nsis --ia32 --publish always

      - name: Upload x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: BM-Player-x86
          path: dist/BM-Player-Setup-*-ia32.exe
          if-no-files-found: warn