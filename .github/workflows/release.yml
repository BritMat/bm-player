name: Build & Release BM Player

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── x64 Build (Modern 64-bit) ────────────────────────────
  build-x64:
    name: Windows x64 Installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate icon
        run: node scripts/generate-icon.js

      - name: Convert icon PNG to ICO
        shell: pwsh
        run: |
          $pngPath = "buildResources\icon.png"
          $icoPath = "buildResources\icon.ico"
          Add-Type -AssemblyName System.Drawing
          $bmp = [System.Drawing.Bitmap]::FromFile((Resolve-Path $pngPath).Path)
          $sizes = @(16, 32, 48, 64, 128, 256)
          $stream = [System.IO.File]::Create($icoPath)
          $writer = New-Object System.IO.BinaryWriter($stream)
          $writer.Write([uint16]0); $writer.Write([uint16]1); $writer.Write([uint16]$sizes.Count)
          $offset = 6 + $sizes.Count * 16; $images = @()
          foreach ($size in $sizes) {
            $resized = New-Object System.Drawing.Bitmap($bmp, $size, $size)
            $ms = New-Object System.IO.MemoryStream
            $resized.Save($ms, [System.Drawing.Imaging.ImageFormat]::Png)
            $images += ,$ms.ToArray(); $resized.Dispose()
          }
          foreach ($i in 0..($sizes.Count-1)) {
            $sz=$sizes[$i]; $data=$images[$i]
            $writer.Write([byte]($sz -band 0xFF)); $writer.Write([byte]($sz -band 0xFF))
            $writer.Write([byte]0); $writer.Write([byte]0)
            $writer.Write([uint16]1); $writer.Write([uint16]32)
            $writer.Write([uint32]$data.Length); $writer.Write([uint32]$offset); $offset+=$data.Length
          }
          foreach ($data in $images) { $writer.Write($data) }
          $writer.Close(); $stream.Close(); $bmp.Dispose()

      - name: Download and Extract mpv x64
        shell: bash
        run: |
          mkdir -p vendor/mpv
          cd vendor/mpv
          ASSET_URL=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest" | jq -r '.assets[] | select(.name | test("^mpv-x86_64.*\\.7z$")) | select(.name | test("dev|debug") | not) | .browser_download_url' | head -n 1)
          curl -sL "$ASSET_URL" -o mpv.7z
          7z e mpv.7z -y
          rm mpv.7z

      - name: Build x64 installer
        run: npx electron-builder --win nsis --x64

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: BM-Player-x64
          path: dist/BM-Player-Setup-*-x64.exe
          if-no-files-found: warn

  # ── x86 Build (Legacy 32-bit) ────────────────────────────
  build-x86:
    name: Windows x86 Installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate icon
        run: node scripts/generate-icon.js

      - name: Convert icon PNG to ICO
        shell: pwsh
        run: |
          $pngPath = "buildResources\icon.png"
          $icoPath = "buildResources\icon.ico"
          Add-Type -AssemblyName System.Drawing
          $bmp = [System.Drawing.Bitmap]::FromFile((Resolve-Path $pngPath).Path)
          $sizes = @(16, 32, 48, 64, 128, 256)
          $stream = [System.IO.File]::Create($icoPath)
          $writer = New-Object System.IO.BinaryWriter($stream)
          $writer.Write([uint16]0); $writer.Write([uint16]1); $writer.Write([uint16]$sizes.Count)
          $offset = 6 + $sizes.Count * 16; $images = @()
          foreach ($size in $sizes) {
            $resized = New-Object System.Drawing.Bitmap($bmp, $size, $size)
            $ms = New-Object System.IO.MemoryStream
            $resized.Save($ms, [System.Drawing.Imaging.ImageFormat]::Png)
            $images += ,$ms.ToArray(); $resized.Dispose()
          }
          foreach ($i in 0..($sizes.Count-1)) {
            $sz=$sizes[$i]; $data=$images[$i]
            $writer.Write([byte]($sz -band 0xFF)); $writer.Write([byte]($sz -band 0xFF))
            $writer.Write([byte]0); $writer.Write([byte]0)
            $writer.Write([uint16]1); $writer.Write([uint16]32)
            $writer.Write([uint32]$data.Length); $writer.Write([uint32]$offset); $offset+=$data.Length
          }
          foreach ($data in $images) { $writer.Write($data) }
          $writer.Close(); $stream.Close(); $bmp.Dispose()

      - name: Download and Extract Legacy mpv x86
        shell: bash
        run: |
          mkdir -p vendor/mpv
          cd vendor/mpv
          ASSET_URL=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases" | jq -r '[.[] | select(.assets[].name | test("^mpv-i686.*\\.7z$"))][0] | .assets[] | select(.name | test("^mpv-i686.*\\.7z$")) | select(.name | test("dev|debug") | not) | .browser_download_url' | head -n 1)
          curl -sL "$ASSET_URL" -o mpv-x86.7z
          7z e mpv-x86.7z -y
          rm mpv-x86.7z

      - name: Build x86 installer
        run: npx electron-builder --win nsis --ia32

      - name: Upload x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: BM-Player-x86
          path: dist/BM-Player-Setup-*-ia32.exe
          if-no-files-found: warn