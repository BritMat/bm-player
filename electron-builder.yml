appId: "com.bmplayer.app"
productName: "BM Player"
copyright: "Copyright © 2026 BM Player"
directories:
  output: "dist"
  buildResources: "buildResources"
files:
  - "main.js"
  - "preload.js"
  - "src/**/*"
  - "node_modules/**/*"
  - "!node_modules/*/{CHANGELOG.md,README.md,readme.md}"
  - "!node_modules/**/*.d.ts"
  - "!node_modules/.bin"
  - "!dist"
extraResources:
  - from: "vendor/mpv"
    to: "mpv"
    filter: ["**/*", "!*.md", "!.keep"]
fileAssociations:
  - ext: ["mp4","m4v","mkv","avi","mov","wmv","flv","webm","ts","m2ts","mpg","mpeg","ogv","3gp","vob"]
    name: "Video File"
    description: "Video file (BM Player)"
    role: "Viewer"
    icon: "buildResources/icon.ico"
  - ext: ["mp3","flac","aac","ogg","wav","m4a","wma","opus","ape","mka"]
    name: "Audio File"
    description: "Audio file (BM Player)"
    role: "Viewer"
    icon: "buildResources/icon.ico"
win:
  icon: "buildResources/icon.ico"
  target:
    - target: "nsis"
  artifactName: "BM-Player-Setup-${version}-${arch}.exe"
  requestedExecutionLevel: "asInvoker"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "BM Player"
  installerIcon: "buildResources/icon.ico"
  uninstallerIcon: "buildResources/icon.ico"
  installerHeaderIcon: "buildResources/icon.ico"
  deleteAppDataOnUninstall: false
  include: "buildResources/installer.nsh"
