appId: "com.bmplayer.app"
productName: "BM Player"
copyright: "Copyright © 2026 BM Player"
directories:
  output: "dist"
  buildResources: "buildResources"
files:
  - "main.js"
  - "preload.js"
  - "src/**/*"
  - "node_modules/**/*"
  - "!node_modules/*/{CHANGELOG.md,README.md,readme.md}"
  - "!node_modules/*/{test,__tests__,tests,example,examples}"
  - "!node_modules/**/*.d.ts"
  - "!node_modules/.bin"
  - "!dist"
extraResources:
  - from: "vendor/mpv"
    to: "mpv"
    filter: ["**/*", "!*.md", "!.keep"]
win:
  icon: "buildResources/icon.ico"
  target:
    - target: "nsis"
  artifactName: "BM-Player-Setup-${version}-${arch}.exe"
  requestedExecutionLevel: "asInvoker"
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "BM Player"
  installerIcon: "buildResources/icon.ico"
  uninstallerIcon: "buildResources/icon.ico"
  installerHeaderIcon: "buildResources/icon.ico"
  deleteAppDataOnUninstall: false