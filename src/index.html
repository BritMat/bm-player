<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="titlebar-hit-zone"></div>
<div id="titlebar" class="titlebar">
  <div class="titlebar-drag"><span class="titlebar-title">BM Player</span></div>
  <div class="titlebar-controls">
    <button class="tb-btn" id="btn-minimize">_</button>
    <button class="tb-btn" id="btn-maximize">□</button>
    <button class="tb-btn danger" id="btn-close">✕</button>
  </div>
</div>

<div id="welcome-screen" class="welcome-screen active">
  <div class="fox-stage"><canvas id="fox-canvas"></canvas></div>
  <div class="welcome-text">
    <h1 class="welcome-title">BM Player</h1>
    <p class="welcome-sub">Drop files here or click to open</p>
  </div>
  <button class="btn-primary" id="btn-open-welcome">Open Media</button>
  
  <div class="theme-row" id="theme-row">
    <button class="theme-pill active" data-theme="dark">🌙 Dark</button>
    <button class="theme-pill" data-theme="light">☀️ Light</button>
    <button class="theme-pill" data-theme="glass">🔮 Glass</button>
  </div>
</div>

<div id="player-view" class="player-view">
  <div id="video-area" class="video-area">
    <canvas id="visualizer-canvas" class="visualizer-canvas active"></canvas>
  </div>
  
  <div class="controls-bar">
    <div class="seek-row">
      <span class="time-display" id="time-current">00:00</span>
      <div class="seek-container" id="seek-bar">
        <div class="seek-track">
          <div class="seek-progress" id="seek-progress"></div>
        </div>
      </div>
      <span class="time-display" id="time-total">00:00</span>
    </div>
    <div class="controls-main">
      <button class="ctrl-btn play-btn" id="btn-play">▶</button>
    </div>
  </div>
</div>

<script type="module">
    import * as THREE from '../node_modules/three/build/three.module.js';
    window.THREE = THREE;
</script>
<script type="module" src="js/app.js"></script>

</body>
</html>
