<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BM Player</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div class="titlebar">
    <div class="title-text" id="title-text">BM Player</div>
    <div class="window-controls">
      <button id="btn-minimize">─</button>
      <button id="btn-maximize">□</button>
      <button id="btn-close">✕</button>
    </div>
  </div>

  <div id="welcome-screen" class="active">
    <canvas id="fox-canvas"></canvas>
    <h2>Welcome to BM Player</h2>
    <button id="btn-open-welcome" class="primary-btn">Open Media</button>
    
    <div class="theme-selector">
      <button class="theme-pill active" data-theme="dark">Dark</button>
      <button class="theme-pill" data-theme="light">Light</button>
      <button class="theme-pill" data-theme="glass">Glass</button>
      <button class="theme-pill" data-theme="dracula">Dracula</button>
      <button class="theme-pill" data-theme="northern">Northern</button>
    </div>
  </div>

  <div id="player-view">
    
    <div id="osd" class="osd"></div>

    <div class="control-bar">
      
      <div class="seek-container" id="seek-bar">
        <div class="seek-progress" id="seek-progress"></div>
      </div>
      
      <div class="controls-row">
        <div class="time-display">
          <span id="time-current">00:00</span> / <span id="time-total">00:00</span>
        </div>

        <div class="center-controls">
          <button id="btn-prev" class="icon-btn">⏮</button>
          <button id="btn-play" class="icon-btn play-btn">▶</button>
          <button id="btn-next" class="icon-btn">⏭</button>
          <button id="btn-stop" class="icon-btn">⏹</button>
        </div>

        <div class="right-controls">
          <button id="btn-mute" class="icon-btn vol-icon" style="padding:0;">🔊</button>
          <input type="range" id="volume-slider" min="0" max="100" value="100">
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
